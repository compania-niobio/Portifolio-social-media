<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfólio profissional de Isadora Rezende: social media, videomaker e storymaker." />
  <title>Portfólio | Isadora Rezende</title>
  <link rel="shortcut icon" href="assets/icons/favicon-white.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page-transition" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Ir para o início">
      <img
        class="img-responsiva logo-img"
        src="assets/imagens/logo_300x300.png"
        srcset="assets/imagens/logo_300x300.png 300w, assets/imagens/logo_600x600.png 600w, assets/imagens/logo_1200x1200.png 1200w"
        sizes="(max-width: 600px) 120px, 160px"
        alt="Logo Isadora Rezende"
        width="300"
        height="300"
      />
    </a>

    <nav aria-label="Menu principal">
      <a href="index.html">Início</a>
      <a href="perfil.html">Perfil</a>
      <a href="projetos.html">Projetos</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <main>
    <section class="hero" id="inicio">
      <img
        class="phone left"
        src="assets/imagens/instagram_600x600.png"
        srcset="assets/imagens/instagram_300x300.png 300w, assets/imagens/instagram_600x600.png 600w, assets/imagens/instagram_1200x1200.png 1200w"
        sizes="(max-width: 600px) 190px, 330px"
        alt="Celular com Instagram"
        width="600"
        height="600"
      />

      <div class="hero-content">
        <h1>Portfólio</h1>
        <p>Social Media • Videomaker • Storymaker</p>
        <a href="perfil.html" class="btn">Conheça</a>
      </div>

      <img
        class="phone right"
        src="assets/imagens/instagram_600x600.png"
        srcset="assets/imagens/instagram_300x300.png 300w, assets/imagens/instagram_600x600.png 600w, assets/imagens/instagram_1200x1200.png 1200w"
        sizes="(max-width: 600px) 190px, 330px"
        alt="Celular com Instagram"
        width="600"
        height="600"
      />
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-brand">
        <img src="assets/imagens/logo_300x300.png" alt="Logo Isadora Rezende" width="300" height="300" loading="lazy" />
        <p>Social Media • Videomaker • Storymaker</p>
      </div>

      <nav class="footer-links" aria-label="Links do rodapé">
        <a href="index.html">Início</a>
        <a href="perfil.html">Perfil</a>
        <a href="projetos.html">Projetos</a>
        <a href="contato.html">Contato</a>
      </nav>

      <div class="footer-contact">
        <p>Marília - SP</p>
        <p>@socialmedia_isadora</p>
        <p>Portfólio profissional</p>
      </div>
    </div>
    <p class="footer-bottom">© 2026 Isadora Rezende. Todos os direitos reservados.</p>
  </footer>

  <div class="loader" aria-hidden="true">
    <img src="assets/imagens/logo_300x300.png" alt="" width="300" height="300" />
  </div>

  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
